<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VocaMind 对话测试</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e8eaed;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 24px 16px;
    }
    .app {
      width: min(720px, 100%);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    h1 { font-size: 1.25rem; font-weight: 600; }
    .status {
      font-size: 0.8rem;
      padding: 4px 10px;
      border-radius: 999px;
      background: #2a2f3a;
      color: #9aa0a6;
    }
    .status.ok { background: #1e3a2f; color: #6ee7a0; }
    .status.busy { background: #3a2e1e; color: #fbbf24; }
    .status.err { background: #3a1e1e; color: #f87171; }
    .settings {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .settings label {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 0.75rem;
      color: #9aa0a6;
      flex: 1;
      min-width: 140px;
    }
    .settings input {
      background: #1a1d27;
      border: 1px solid #2a2f3a;
      border-radius: 8px;
      color: #e8eaed;
      padding: 8px 10px;
      font-size: 0.85rem;
    }
    .chat {
      flex: 1;
      min-height: 360px;
      max-height: 60vh;
      overflow-y: auto;
      background: #1a1d27;
      border: 1px solid #2a2f3a;
      border-radius: 12px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .msg {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 12px;
      line-height: 1.55;
      word-break: break-word;
    }
    .msg.user {
      align-self: flex-end;
      background: #2563eb;
      border-bottom-right-radius: 4px;
      white-space: pre-wrap;
    }
    .msg.assistant {
      align-self: flex-start;
      background: #2a2f3a;
      border-bottom-left-radius: 4px;
      white-space: normal;
      max-width: 92%;
    }
    .msg.assistant > :first-child { margin-top: 0; }
    .msg.assistant > :last-child { margin-bottom: 0; }
    .msg.assistant p { margin: 0.4em 0; }
    .msg.assistant h1, .msg.assistant h2, .msg.assistant h3 { margin: 0.55em 0 0.3em; font-weight: 600; }
    .msg.assistant ul, .msg.assistant ol { margin: 0.35em 0; padding-left: 1.25em; }
    .msg.assistant code { font-size: 0.84em; background: #1a1d27; padding: 1px 5px; border-radius: 4px; }
    .msg.assistant pre { margin: 0.45em 0; padding: 10px 12px; background: #0f1117; border-radius: 8px; overflow-x: auto; font-size: 0.82rem; }
    .msg.assistant pre code { background: none; padding: 0; }
    .msg.assistant a { color: #93c5fd; }
    .msg.assistant hr { border: none; border-top: 1px solid #3a3f4a; margin: 0.65em 0; }
    .msg.assistant .md-table-wrap { overflow-x: auto; margin: 0.45em 0; }
    .msg.assistant table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    .msg.assistant th, .msg.assistant td { border: 1px solid #3a3f4a; padding: 6px 8px; }
    .msg.assistant th { background: #1a1d27; }
    .msg.assistant.streaming::after {
      content: "▋";
      animation: blink 0.8s step-end infinite;
      margin-left: 2px;
      color: #6ee7a0;
    }
    @keyframes blink { 50% { opacity: 0; } }
    .composer {
      display: flex;
      gap: 8px;
    }
    .composer input {
      flex: 1;
      background: #1a1d27;
      border: 1px solid #2a2f3a;
      border-radius: 10px;
      color: #e8eaed;
      padding: 12px 14px;
      font-size: 1rem;
    }
    .composer input:focus { outline: 2px solid #2563eb; border-color: transparent; }
    button {
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 0 18px;
      font-size: 0.95rem;
      cursor: pointer;
      white-space: nowrap;
    }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    button.secondary {
      background: #2a2f3a;
      color: #e8eaed;
    }
    button.mic.active {
      background: #dc2626;
    }
    .hint { font-size: 0.75rem; color: #6b7280; }
    .artifact-card { padding: 0; background: transparent; }
    .artifact-btn {
      background: #1e3a5f;
      color: #93c5fd;
      border: 1px solid #2563eb;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.9rem;
      cursor: pointer;
      width: 100%;
      text-align: left;
    }
    .artifact-btn:hover { background: #1e40af; }
    .doc-modal {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .doc-modal.hidden { display: none; }
    .doc-modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.65);
    }
    .doc-modal-panel {
      position: relative;
      width: min(860px, 94vw);
      max-height: 88vh;
      background: #1a1d27;
      border: 1px solid #2a2f3a;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .doc-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid #2a2f3a;
    }
    .doc-modal-header h2 { font-size: 1rem; font-weight: 600; }
    #docModalClose {
      background: transparent;
      color: #9aa0a6;
      font-size: 1.5rem;
      padding: 0 8px;
      line-height: 1;
    }
    .doc-modal-body {
      padding: 16px 20px;
      overflow-y: auto;
      line-height: 1.65;
    }
    .doc-modal-body h1, .doc-modal-body h2, .doc-modal-body h3 { margin: 1em 0 0.5em; }
    .doc-modal-body p, .doc-modal-body ul, .doc-modal-body ol { margin: 0.5em 0; }
    .doc-modal-body code {
      background: #0f1117;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.9em;
    }
    .doc-modal-body pre {
      background: #0f1117;
      padding: 12px;
      border-radius: 8px;
      overflow-x: auto;
    }
    .doc-modal-body hr {
      border: none;
      border-top: 1px solid #3a3f4a;
      margin: 1.2em 0;
    }
    .doc-modal-body .md-table-wrap {
      overflow-x: auto;
      margin: 0.75em 0;
    }
    .doc-modal-body table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }
    .doc-modal-body th,
    .doc-modal-body td {
      border: 1px solid #3a3f4a;
      padding: 8px 10px;
      text-align: left;
      vertical-align: top;
    }
    .doc-modal-body th {
      background: #0f1117;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>VocaMind 对话</h1>
      <span id="status" class="status">未连接</span>
    </header>

    <div class="settings">
      <label>WebSocket 地址
        <input id="wsUrl" value="ws://localhost:9001" />
      </label>
      <label>ASR API Key
        <input id="asrKey" type="password" placeholder="SiliconFlow Key" />
      </label>
      <label>ASR 模型
        <input id="asrModel" value="FunAudioLLM/SenseVoiceSmall" />
      </label>
      <label>ASR API 地址
        <input id="asrUrl" value="https://api.siliconflow.cn/v1/audio/transcriptions" />
      </label>
    </div>

    <div id="chat" class="chat"></div>

    <div class="composer">
      <input id="input" placeholder="输入文字，Enter 发送" autocomplete="off" />
      <button id="micBtn" class="secondary" disabled title="开启麦克风后说话，停顿时自动识别">🎤</button>
      <button id="connectBtn" class="secondary">连接</button>
      <button id="sendBtn" disabled>发送</button>
    </div>
    <p class="hint">先运行 <code>python main.py</code>，点「连接」后可文字发送或点 🎤 开麦（客户端 VAD + ASR，识别后自动发文字）。</p>
  </div>

  <script type="module">
    import { VoiceConnection } from "./js/voice_connection.js";
    import { PcmFrameBuffer, resampleTo16k } from "./js/audio_resample.js";
    import { ClientVAD } from "./js/client_vad.js";
    import { transcribeAudio, DEFAULT_ASR_URL, DEFAULT_ASR_MODEL } from "./js/client_asr.js";
    import {
      artifactBaseUrlFromWs,
      appendAttachmentCards,
      openArtifactModal,
    } from "./js/artifacts.js";
    import { renderMarkdown } from "./js/markdown_render.js";

    const SAMPLE_RATE = 16000;
    const ASR_KEY_STORAGE = "vocamind_asr_api_key";
    const ASR_URL_STORAGE = "vocamind_asr_api_url";
    const ASR_MODEL_STORAGE = "vocamind_asr_model";
    const UID_STORAGE = "vocamind_uid";

    function getOrCreateUid() {
      let id = localStorage.getItem(UID_STORAGE);
      if (!id) {
        id = crypto.randomUUID();
        localStorage.setItem(UID_STORAGE, id);
      }
      return id;
    }

    const uid = getOrCreateUid();

    let connection = null;
    let userInputCount = 0;
    let busy = false;
    let historySynced = false;
    let syncRetryTimer = null;
    let syncAttempts = 0;
    const MAX_SYNC_ATTEMPTS = 10;
    const SYNC_RETRY_MS = 600;
    let assistantEl = null;
    let lastUserEl = null;

    let micOn = false;
    let micStream = null;
    let micContext = null;
    let micProcessor = null;
    let pcmFrameBuffer = null;
    let clientVad = null;

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const audioQueue = [];
    let audioPlaying = false;
    let currentAudioSource = null;

    const $ = (id) => document.getElementById(id);
    const chat = $("chat");
    const statusEl = $("status");
    const inputEl = $("input");
    const sendBtn = $("sendBtn");
    const connectBtn = $("connectBtn");
    const micBtn = $("micBtn");

    function getAsrConfig() {
      return {
        apiKey: $("asrKey")?.value?.trim() || localStorage.getItem(ASR_KEY_STORAGE) || "",
        apiUrl: $("asrUrl")?.value?.trim() || localStorage.getItem(ASR_URL_STORAGE) || DEFAULT_ASR_URL,
        model: $("asrModel")?.value?.trim() || localStorage.getItem(ASR_MODEL_STORAGE) || DEFAULT_ASR_MODEL,
      };
    }

    function persistAsrConfig() {
      const cfg = getAsrConfig();
      localStorage.setItem(ASR_KEY_STORAGE, cfg.apiKey);
      localStorage.setItem(ASR_URL_STORAGE, cfg.apiUrl);
      localStorage.setItem(ASR_MODEL_STORAGE, cfg.model);
    }

    function stopPlayback() {
      audioQueue.length = 0;
      if (currentAudioSource) {
        try {
          currentAudioSource.stop();
        } catch (_) {}
        currentAudioSource = null;
      }
      audioPlaying = false;
      notifyPlaying(false);
    }

    function onSpeechStart() {
      if (audioPlaying) {
        stopPlayback();
      }
    }

    function resetConnectionState() {
      busy = false;
      finishAssistantBubble();
      lastUserEl = null;
      stopPlayback();
    }

    function resetTurnState() {
      userInputCount = 0;
      resetConnectionState();
    }

    async function onSpeechSegment(segment) {
      if (!connection?.isOpen || busy || !historySynced) return;

      busy = true;
      sendBtn.disabled = true;
      finishAssistantBubble();
      lastUserEl = appendMsg("user", "🎤 识别中…");
      setStatus("识别中…", "busy");

      try {
        const text = await transcribeAudio(segment, {
          ...getAsrConfig(),
          sampleRate: SAMPLE_RATE,
        });
        if (!text) {
          throw new Error("未识别到语音内容");
        }
        if (lastUserEl) {
          lastUserEl.textContent = text;
        }
        userInputCount += 1;
        connection.send({ uid, text, audio_input: true });
      } catch (err) {
        busy = false;
        sendBtn.disabled = false;
        lastUserEl = null;
        setStatus(err.message || "语音识别失败", "err");
        console.error(err);
      }
    }

    function processMicFrame(frame) {
      clientVad?.pushFrame(frame);
    }

    function clearSyncRetry() {
      if (syncRetryTimer) {
        clearTimeout(syncRetryTimer);
        syncRetryTimer = null;
      }
    }

    function finishHistorySync() {
      historySynced = true;
      clearSyncRetry();
      if (connection?.isOpen && !busy) {
        sendBtn.disabled = false;
        micBtn.disabled = false;
      }
      setStatus(micOn ? "麦克风已开" : "已连接", "ok");
    }

    function scheduleHistorySyncRetry() {
      clearSyncRetry();
      syncRetryTimer = setTimeout(() => {
        if (historySynced) return;
        if (syncAttempts >= MAX_SYNC_ATTEMPTS) {
          console.warn("历史同步超时，已允许继续对话");
          finishHistorySync();
          return;
        }
        syncAttempts += 1;
        tryRequestHistorySync();
        scheduleHistorySyncRetry();
      }, SYNC_RETRY_MS);
    }

    function beginHistorySync() {
      historySynced = false;
      syncAttempts = 0;
      sendBtn.disabled = true;
      setStatus("同步历史中…", "busy");
      scheduleHistorySyncRetry();
    }

    function tryRequestHistorySync() {
      if (!connection?.isOpen) return;
      try {
        connection.send({ type: "sync_history", uid });
      } catch (err) {
        console.warn("发送历史同步请求失败", err);
      }
    }

    function requestHistorySync() {
      beginHistorySync();
      tryRequestHistorySync();
    }

    function clearChatMessages() {
      chat.querySelectorAll(".msg, .artifact-card, .history-notice").forEach((el) => el.remove());
    }

    function handleHistorySync(data) {
      if (data.uid && data.uid !== uid) return;

      clearChatMessages();
      userInputCount = data.user_input_count || 0;
      resetConnectionState();

      if (data.has_summary) {
        const notice = document.createElement("div");
        notice.className = "history-notice";
        notice.textContent = "更早的对话已压缩，助手仍保留上下文记忆";
        notice.style.cssText = "align-self:center;font-size:0.72rem;color:#6b7280;background:#1a1d27;border:1px dashed #2a2f3a;border-radius:999px;padding:6px 14px;text-align:center;max-width:90%;margin:4px auto;";
        chat.appendChild(notice);
      }

      for (const turn of data.turns || []) {
        const role = turn.role === "user" ? "user" : "assistant";
        appendMsg(role, turn.content || "");
      }

      finishHistorySync();
      chat.scrollTop = chat.scrollHeight;
    }

    function handleSocketMessage(data) {
      if (data.type === "ready") {
        tryRequestHistorySync();
        return;
      }
      if (data.type === "history_sync") {
        handleHistorySync(data);
        return;
      }
      if (data.stop_playback) {
        if (!data.uid || data.uid === uid) {
          stopPlayback();
        }
        return;
      }
      const hasPayload =
        data.question_text ||
        data.answer_text ||
        data.answer_audio ||
        data.attachments?.length ||
        data.end_flag;
      if (data.placeholder !== undefined || !hasPayload) {
        return;
      }
      handleOutbound(data);
    }

    async function startMic() {
      if (micOn) return;
      if (!connection?.isOpen) {
        setStatus("请先连接", "err");
        return;
      }
      persistAsrConfig();
      if (!getAsrConfig().apiKey) {
        setStatus("请先填写 ASR API Key", "err");
        return;
      }
      try {
        await audioCtx.resume();
        micStream = await navigator.mediaDevices.getUserMedia({
          audio: { channelCount: 1, echoCancellation: true, noiseSuppression: true },
          video: false,
        });
        micContext = new AudioContext();
        const captureRate = micContext.sampleRate;
        pcmFrameBuffer = new PcmFrameBuffer();
        clientVad = new ClientVAD({
          sampleRate: SAMPLE_RATE,
          onSpeechStart,
          onSpeechSegment,
        });
        const source = micContext.createMediaStreamSource(micStream);
        micProcessor = micContext.createScriptProcessor(4096, 1, 1);
        micProcessor.onaudioprocess = (ev) => {
          if (!micOn) return;
          const raw = ev.inputBuffer.getChannelData(0);
          const pcm16k = resampleTo16k(raw, captureRate);
          pcmFrameBuffer.push(pcm16k, processMicFrame);
        };
        source.connect(micProcessor);
        micProcessor.connect(micContext.destination);
        micOn = true;
        micBtn.classList.add("active");
        micBtn.textContent = "🔴";
        setStatus("麦克风已开", "ok");
      } catch (err) {
        setStatus("麦克风权限被拒绝", "err");
        console.error(err);
      }
    }

    function stopMic() {
      micOn = false;
      clientVad?.reset();
      clientVad = null;
      pcmFrameBuffer?.reset();
      pcmFrameBuffer = null;
      micProcessor?.disconnect();
      micProcessor = null;
      micStream?.getTracks().forEach((t) => t.stop());
      micStream = null;
      if (micContext) {
        micContext.close().catch(() => {});
        micContext = null;
      }
      micBtn.classList.remove("active");
      micBtn.textContent = "🎤";
    }

    async function toggleMic() {
      if (micOn) stopMic();
      else await startMic();
    }

    function setStatus(text, kind = "") {
      statusEl.textContent = text;
      statusEl.className = "status" + (kind ? " " + kind : "");
    }

    function setAssistantContent(el, rawText) {
      el._rawText = rawText;
      el.innerHTML = renderMarkdown(rawText);
    }

    function appendMsg(role, text) {
      const el = document.createElement("div");
      el.className = `msg ${role}`;
      if (role === "assistant") {
        setAssistantContent(el, text);
      } else {
        el.textContent = text;
      }
      chat.appendChild(el);
      chat.scrollTop = chat.scrollHeight;
      return el;
    }

    function ensureAssistantBubble() {
      if (!assistantEl) {
        assistantEl = appendMsg("assistant", "");
        assistantEl.classList.add("streaming");
      }
      return assistantEl;
    }

    function finishAssistantBubble() {
      if (assistantEl) {
        assistantEl.classList.remove("streaming");
        assistantEl = null;
      }
    }

    function notifyPlaying(isPlaying) {
      if (connection?.isOpen) {
        connection.send({ uid, is_playing: isPlaying ? "true" : "false" });
      }
    }

    function pcmBase64ToBuffer(b64) {
      const binary = atob(b64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      const int16 = new Int16Array(bytes.buffer);
      const buf = audioCtx.createBuffer(1, int16.length, SAMPLE_RATE);
      const channel = buf.getChannelData(0);
      for (let i = 0; i < int16.length; i++) channel[i] = int16[i] / 32768;
      return buf;
    }

    function enqueueAudio(b64) {
      if (!b64) return;
      audioQueue.push(pcmBase64ToBuffer(b64));
      if (!audioPlaying) playNextAudio();
    }

    function playNextAudio() {
      if (audioQueue.length === 0) {
        audioPlaying = false;
        notifyPlaying(false);
        return;
      }
      if (!audioPlaying) {
        audioPlaying = true;
        notifyPlaying(true);
      }
      const buffer = audioQueue.shift();
      const source = audioCtx.createBufferSource();
      source.buffer = buffer;
      source.connect(audioCtx.destination);
      currentAudioSource = source;
      source.onended = () => {
        currentAudioSource = null;
        playNextAudio();
      };
      source.start(0);
    }

    function onConnectionStateChange(state) {
      if (state === VoiceConnection.State.CONNECTED) {
        resetConnectionState();
        beginHistorySync();
        tryRequestHistorySync();
        micBtn.disabled = false;
        connectBtn.textContent = "已连接";
      } else if (state === VoiceConnection.State.CONNECTING) {
        setStatus("连接中…", "busy");
        sendBtn.disabled = true;
        micBtn.disabled = true;
        connectBtn.textContent = "连接中";
      } else {
        stopMic();
        micBtn.disabled = true;
        clearSyncRetry();
        historySynced = false;
        if (!busy) {
          setStatus("未连接", "");
          sendBtn.disabled = true;
        } else {
          setStatus("思考中…", "busy");
        }
        connectBtn.textContent = "重连";
      }
    }

    function finishTurn() {
      finishAssistantBubble();
      busy = false;
      sendBtn.disabled = false;
      lastUserEl = null;
      inputEl.focus();
      if (connection?.isOpen) {
        setStatus(micOn ? "麦克风已开" : "已连接", "ok");
      }
    }

    function getArtifactBaseUrl() {
      return artifactBaseUrlFromWs($("wsUrl").value.trim() || "ws://localhost:9001");
    }

    function handleAttachments(attachments) {
      if (!attachments?.length) return;
      appendAttachmentCards(chat, attachments, {
        baseUrl: getArtifactBaseUrl(),
        onOpen: (att) => openArtifactModal(att, getArtifactBaseUrl()),
      });
    }

    function handleOutbound(data) {
      if (data.uid !== uid) return;
      if (!historySynced && !data.proactive) return;
      if (!data.proactive && data.user_input_count !== userInputCount) {
        console.warn(
          "丢弃出站消息: count 不匹配",
          "server=",
          data.user_input_count,
          "client=",
          userInputCount,
        );
        return;
      }

      if (data.proactive && !busy) {
        busy = true;
        sendBtn.disabled = false;
        finishAssistantBubble();
        setStatus("助手通知…", "busy");
      }

      if (data.question_text) {
        if (lastUserEl) {
          lastUserEl.textContent = data.question_text;
        } else {
          lastUserEl = appendMsg("user", data.question_text);
        }
        chat.scrollTop = chat.scrollHeight;
      }
      if (data.answer_text) {
        const el = ensureAssistantBubble();
        setAssistantContent(el, (el._rawText || "") + data.answer_text);
        chat.scrollTop = chat.scrollHeight;
      }
      if (data.answer_audio && data.answer_audio !== "" && data.answer_audio !== 0) {
        enqueueAudio(data.answer_audio);
      }
      if (data.attachments?.length) {
        handleAttachments(data.attachments);
      }
      if (data.end_flag) {
        finishTurn();
      }
    }

    function connect() {
      const url = $("wsUrl").value.trim();
      if (connection) {
        connection.disconnect();
      }
      resetConnectionState();
      connection = new VoiceConnection({
        url,
        onStateChange: onConnectionStateChange,
        onMessage: handleSocketMessage,
        onError: () => setStatus("连接错误", "err"),
      });
      connection.connect();
    }

    async function sendText() {
      const text = inputEl.value.trim();
      if (!text) return;
      if (!connection?.isOpen) {
        setStatus("请先连接", "err");
        return;
      }
      if (busy) {
        setStatus("请等待上一条回复", "err");
        return;
      }
      if (!historySynced) {
        tryRequestHistorySync();
        setStatus("同步历史中…", "busy");
        return;
      }

      await audioCtx.resume();
      stopPlayback();

      userInputCount += 1;
      busy = true;
      sendBtn.disabled = true;
      finishAssistantBubble();
      lastUserEl = appendMsg("user", text);
      inputEl.value = "";
      setStatus("思考中…", "busy");

      connection.send({ uid, text });
    }

    connectBtn.addEventListener("click", connect);
    micBtn.addEventListener("click", toggleMic);
    sendBtn.addEventListener("click", sendText);
    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendText();
      }
    });
    $("asrUrl").value = localStorage.getItem(ASR_URL_STORAGE) || DEFAULT_ASR_URL;
    $("asrModel").value = localStorage.getItem(ASR_MODEL_STORAGE) || DEFAULT_ASR_MODEL;
    $("asrKey").value = localStorage.getItem(ASR_KEY_STORAGE) || "";
    ["asrKey", "asrUrl", "asrModel"].forEach((id) => {
      $(id)?.addEventListener("change", persistAsrConfig);
    });
    connect();
  </script>
</body>
</html>
